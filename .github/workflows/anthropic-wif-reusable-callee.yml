name: Anthropic WIF reusable callee

on:
  workflow_call:
    inputs:
      audience:
        description: "OIDC audience to request from GitHub"
        required: false
        type: string
        default: "https://api.anthropic.com"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hyunjun12312/h1-anthropic-api-wif-jwt-lab
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Reusable-callee WIF exchange
        env:
          INPUT_AUDIENCE: ${{ inputs.audience }}
          INPUT_EXPERIMENT: replay_same_jti
          RUN_EXCHANGE: true
          ANTHROPIC_ORGANIZATION_ID: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          ANTHROPIC_WORKSPACE_ID: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          ANTHROPIC_FEDERATION_RULE_ID: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          ANTHROPIC_SERVICE_ACCOUNT_ID: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          H1_HANDLE: cyclopesy
        run: node scripts/anthropic-wif-jwt-boundary.mjs

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-wif-reusable-callee
          path: evidence/
          if-no-files-found: error
