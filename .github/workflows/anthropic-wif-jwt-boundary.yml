name: Anthropic WIF JWT boundary

on:
  workflow_dispatch:
    inputs:
      audience:
        description: "OIDC audience to request from GitHub"
        required: true
        default: "https://api.anthropic.com"
      run_exchange:
        description: "Attempt Anthropic WIF token exchange using repository variables"
        required: true
        type: boolean
        default: false
      experiment:
        description: "One-variable WIF boundary experiment"
        required: true
        default: "legacy_suite"
        type: choice
        options:
          - legacy_suite
          - baseline
          - replay_same_jti
          - alt_workspace_id
          - alt_service_account_id
          - alt_federation_rule_id
          - alt_rule_and_alt_service_account
          - alt_organization_id
          - dummy_workspace_id
          - dummy_service_account_id
          - dummy_federation_rule_id
          - dummy_organization_id
          - request_scope_org_manage_tunnels
          - request_oauth_scope_org_manage_tunnels
          - request_scope_workspace_developer
          - request_oauth_scope_workspace_developer

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect claims and optionally test Anthropic WIF exchange
        env:
          INPUT_AUDIENCE: ${{ inputs.audience }}
          INPUT_EXPERIMENT: ${{ inputs.experiment }}
          RUN_EXCHANGE: ${{ inputs.run_exchange }}
          ANTHROPIC_ORGANIZATION_ID: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          ANTHROPIC_ALT_ORGANIZATION_ID: ${{ vars.ANTHROPIC_ALT_ORGANIZATION_ID }}
          ANTHROPIC_WORKSPACE_ID: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          ANTHROPIC_ALT_WORKSPACE_ID: ${{ vars.ANTHROPIC_ALT_WORKSPACE_ID }}
          ANTHROPIC_FEDERATION_RULE_ID: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          ANTHROPIC_ALT_FEDERATION_RULE_ID: ${{ vars.ANTHROPIC_ALT_FEDERATION_RULE_ID }}
          ANTHROPIC_SERVICE_ACCOUNT_ID: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          ANTHROPIC_ALT_SERVICE_ACCOUNT_ID: ${{ vars.ANTHROPIC_ALT_SERVICE_ACCOUNT_ID }}
          ANTHROPIC_B_ORGANIZATION_ID: ${{ vars.ANTHROPIC_B_ORGANIZATION_ID }}
          ANTHROPIC_B_WORKSPACE_ID: ${{ vars.ANTHROPIC_B_WORKSPACE_ID }}
          ANTHROPIC_B_FEDERATION_RULE_ID: ${{ vars.ANTHROPIC_B_FEDERATION_RULE_ID }}
          ANTHROPIC_B_SERVICE_ACCOUNT_ID: ${{ vars.ANTHROPIC_B_SERVICE_ACCOUNT_ID }}
          ANTHROPIC_TEST_MODEL: ${{ vars.ANTHROPIC_TEST_MODEL }}
          ANTHROPIC_FILES_BETA: ${{ vars.ANTHROPIC_FILES_BETA }}
          ANTHROPIC_MESSAGE_BATCHES_BETA: ${{ vars.ANTHROPIC_MESSAGE_BATCHES_BETA }}
          ANTHROPIC_TUNNELS_BETA: mcp-tunnels-2026-05-19
          ANTHROPIC_API_KEY_B: ${{ secrets.ANTHROPIC_API_KEY_B }}
          H1_HANDLE: cyclopesy
        run: node scripts/anthropic-wif-jwt-boundary.mjs

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-wif-jwt-boundary-evidence
          path: evidence/
          if-no-files-found: error
