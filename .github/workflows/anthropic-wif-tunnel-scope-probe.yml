name: Anthropic WIF tunnel scope probe

on:
  workflow_dispatch:
    inputs:
      audience:
        description: "OIDC audience to request from GitHub"
        required: true
        default: "https://api.anthropic.com"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Probe Anthropic MCP tunnel WIF scope
        env:
          INPUT_AUDIENCE: ${{ inputs.audience }}
          ANTHROPIC_ORGANIZATION_ID: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          ANTHROPIC_WORKSPACE_ID: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          ANTHROPIC_FEDERATION_RULE_ID: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          ANTHROPIC_SERVICE_ACCOUNT_ID: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          ANTHROPIC_TUNNELS_BETA: mcp-tunnels-2026-05-19
          H1_HANDLE: cyclopesy
        run: node scripts/anthropic-wif-tunnel-scope-probe.mjs

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-wif-tunnel-scope-probe-evidence
          path: evidence/
          if-no-files-found: error
